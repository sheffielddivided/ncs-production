<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
  <title>NVE Magasinstatistikk</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --navy:  #004890;
      --blue:  #0072b0;
      --tint:  #e6f0f8;
      --green: #16a34a;
      --red:   #dc2626;
      --text:  #111827;
      --sub:   #6b7280;
      --border:#e5e7eb;
      --bg:    #f4f7fb;
      --card:  #ffffff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
    }

    /* ── Header ── */
    header {
      background: var(--navy);
      color: #fff;
      padding: 14px 16px 12px;
      position: sticky;
      top: 0;
      z-index: 20;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
    }
    .header-inner { display: flex; align-items: center; gap: 10px; }
    header h1 { font-size: 1.05rem; font-weight: 700; letter-spacing: -.02em; }
    header p  { font-size: .72rem; opacity: .75; margin-top: 2px; }

    /* ── Region tabs ── */
    .tabs-bar {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding: 0 8px;
      gap: 2px;
    }
    .tabs-bar::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0;
      padding: 11px 13px;
      font-size: .82rem;
      font-weight: 500;
      color: var(--sub);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      white-space: nowrap;
      transition: color .15s, border-color .15s;
    }
    .tab.active { color: var(--blue); border-bottom-color: var(--blue); }
    .tab:hover:not(.active) { color: var(--text); }

    /* ── Layout ── */
    .page { padding: 16px; max-width: 580px; margin: 0 auto; }

    /* ── Stat card ── */
    .stat-card {
      background: var(--card);
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      display: flex;
      gap: 16px;
      align-items: center;
    }
    .gauge-wrap {
      position: relative;
      width: 88px;
      height: 88px;
      flex-shrink: 0;
    }
    .gauge-wrap canvas { width: 88px !important; height: 88px !important; }
    .gauge-pct {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .gauge-pct .big   { font-size: 1.25rem; font-weight: 800; color: var(--navy); line-height: 1; }
    .gauge-pct .small { font-size: .65rem; color: var(--sub); margin-top: 1px; }
    .stat-info { flex: 1; min-width: 0; }
    .stat-region { font-size: .75rem; color: var(--sub); margin-bottom: 3px; }
    .stat-week   { font-size: .88rem; font-weight: 600; margin-bottom: 10px; }
    .stat-pills  { display: flex; flex-wrap: wrap; gap: 8px; }
    .pill {
      background: var(--tint);
      border-radius: 8px;
      padding: 6px 10px;
      min-width: 70px;
    }
    .pill .val { font-size: .88rem; font-weight: 700; color: var(--navy); }
    .pill .lbl { font-size: .68rem; color: var(--sub); margin-top: 1px; }
    .pill.up   .val { color: var(--green); }
    .pill.down .val { color: var(--red);   }

    /* ── Chart card ── */
    .chart-card {
      background: var(--card);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      margin-bottom: 14px;
    }
    .chart-head { margin-bottom: 12px; }
    .chart-head .title { font-size: .9rem; font-weight: 700; }
    .chart-head .sub   { font-size: .73rem; color: var(--sub); margin-top: 2px; }

    /* Legend */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
      margin-top: 10px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: .73rem;
      color: var(--sub);
    }
    .legend-line {
      width: 22px;
      height: 3px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .legend-band {
      width: 22px;
      height: 10px;
      border-radius: 3px;
      flex-shrink: 0;
      background: rgba(0,114,176,0.18);
      border: 1px solid rgba(0,114,176,0.3);
    }
    .legend-dashed {
      width: 22px;
      height: 0;
      border-top: 2px dashed #9ca3af;
      flex-shrink: 0;
    }

    .chart-wrap { position: relative; height: 240px; }

    /* ── States ── */
    .state-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 280px;
      gap: 14px;
      color: var(--sub);
      font-size: .85rem;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-box {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 10px;
      padding: 16px;
      color: #b91c1c;
      font-size: .83rem;
      line-height: 1.5;
    }
    .error-box strong { display: block; margin-bottom: 4px; }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 16px 16px 24px;
      font-size: .72rem;
      color: var(--sub);
    }
    footer a { color: var(--blue); text-decoration: none; }

    @media (max-width: 360px) {
      .stat-card { flex-direction: column; align-items: flex-start; }
      .gauge-wrap { width: 72px; height: 72px; }
      .gauge-wrap canvas { width: 72px !important; height: 72px !important; }
      .gauge-pct .big { font-size: 1.05rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2z"/>
      <path d="M12 6v6l4 2"/>
    </svg>
    <div>
      <h1>Magasinstatistikk</h1>
      <p id="hdr-sub">Laster data…</p>
    </div>
  </div>
</header>

<div class="tabs-bar" id="tabs-bar"></div>

<div class="page">
  <div id="main-content">
    <div class="state-box">
      <div class="spinner"></div>
      <span>Henter data fra NVE…</span>
    </div>
  </div>
</div>

<footer>
  Data: <a href="https://www.nve.no/energi/analyser-og-statistikk/magasinstatistikk/"
           target="_blank" rel="noopener">NVE Magasinstatistikk</a>
  &nbsp;·&nbsp; Oppdateres ukentlig
</footer>

<script>
'use strict';

const API          = 'https://biapi.nve.no/magasinstatistikk/api/Magasinstatistikk/HentOffentligData';
const CURRENT_YEAR = new Date().getFullYear();
const HIST_YEARS   = 20;

const REGIONS = [
  { key: 'NO1',  label: 'NO1',   name: 'NO1 – Østlandet',  match: d => d.omrType === 'EL' && d.omrnr === 1 },
  { key: 'NO2',  label: 'NO2',   name: 'NO2 – Sørlandet',  match: d => d.omrType === 'EL' && d.omrnr === 2 },
  { key: 'NO3',  label: 'NO3',   name: 'NO3 – Midt-Norge', match: d => d.omrType === 'EL' && d.omrnr === 3 },
  { key: 'NO4',  label: 'NO4',   name: 'NO4 – Nord-Norge', match: d => d.omrType === 'EL' && d.omrnr === 4 },
  { key: 'NO5',  label: 'NO5',   name: 'NO5 – Vestlandet', match: d => d.omrType === 'EL' && d.omrnr === 5 },
  { key: 'LAND', label: 'Norge', name: 'Hele Norge',        match: d => d.omrType !== 'EL' },
];

// X-axis: week number → month label (show label at first week of each month)
const MONTH_LABEL = {
   1:'Jan',  5:'Feb',  9:'Mar', 14:'Apr', 18:'Mai', 23:'Jun',
  27:'Jul', 31:'Aug', 36:'Sep', 40:'Okt', 45:'Nov', 49:'Des',
};

let allData    = [];
let activeKey  = 'NO1';
let lineChart  = null;
let donutChart = null;

// ── Normalise fill percentage ─────────────────────────────────
// API may return fyllingsgrad as fraction (0–1) or percent (0–100).
// Detect scale once from first batch of non-zero historical rows.
let pctScale = null;

function detectScale(rows) {
  if (pctScale !== null) return;
  const sample = rows.filter(r => r.fyllingsgrad > 0).slice(0, 200);
  if (!sample.length) return;
  const maxVal = Math.max(...sample.map(r => r.fyllingsgrad));
  pctScale = maxVal <= 1 ? 100 : 1;
}

function calcPct(row) {
  const fg = row.fyllingsgrad;
  if (fg != null && fg !== 0 && pctScale !== null) {
    return fg * pctScale;
  }
  // Fallback: derive from energy values
  if (row.fylling_TWh > 0 && row.kapasitet_TWh > 0) {
    return (row.fylling_TWh / row.kapasitet_TWh) * 100;
  }
  return null;
}

// ── Median helper ─────────────────────────────────────────────
function median(arr) {
  if (!arr.length) return null;
  const s = [...arr].sort((a, b) => a - b);
  const m = Math.floor(s.length / 2);
  return s.length % 2 ? s[m] : (s[m - 1] + s[m]) / 2;
}

// ── Filter & sort rows for selected region ────────────────────
function getRows(key) {
  const cfg = REGIONS.find(r => r.key === key);
  return allData
    .filter(cfg.match)
    .sort((a, b) => (a.iso_aar - b.iso_aar) || (a.iso_uke - b.iso_uke));
}

// ── Build per-week chart data ─────────────────────────────────
function buildChartData(rows) {
  const histFrom = CURRENT_YEAR - HIST_YEARS;

  // Indexed by week 1–52
  const byWeek = {};
  for (let w = 1; w <= 52; w++) byWeek[w] = { cur: null, hist: [] };

  for (const r of rows) {
    const w = r.iso_uke;
    if (w < 1 || w > 52) continue;
    const pct = calcPct(r);
    if (pct == null || pct < 0) continue;

    if (r.iso_aar === CURRENT_YEAR) {
      byWeek[w].cur = pct;
    } else if (r.iso_aar >= histFrom && r.iso_aar < CURRENT_YEAR) {
      byWeek[w].hist.push(pct);
    }
  }

  const weeks = Array.from({ length: 52 }, (_, i) => i + 1);
  return {
    weeks,
    cur:    weeks.map(w => byWeek[w].cur),
    med:    weeks.map(w => median(byWeek[w].hist)),
    min:    weeks.map(w => byWeek[w].hist.length ? Math.min(...byWeek[w].hist) : null),
    max:    weeks.map(w => byWeek[w].hist.length ? Math.max(...byWeek[w].hist) : null),
  };
}

// ── Week label helper ─────────────────────────────────────────
function weekLabel(r) {
  return `Uke ${r.iso_uke}, ${r.iso_aar}`;
}

// ── Tabs ─────────────────────────────────────────────────────
function renderTabs() {
  document.getElementById('tabs-bar').innerHTML = REGIONS.map(r => `
    <button class="tab${r.key === activeKey ? ' active' : ''}"
            onclick="switchRegion('${r.key}')">${r.label}</button>
  `).join('');
}

function switchRegion(key) {
  activeKey = key;
  renderTabs();
  renderView();
}

// ── Full view ─────────────────────────────────────────────────
function renderView() {
  const cfg    = REGIONS.find(r => r.key === activeKey);
  const rows   = getRows(activeKey);
  const latest = rows[rows.length - 1];

  if (!latest) {
    document.getElementById('main-content').innerHTML =
      `<div class="error-box"><strong>Ingen data</strong>Fant ingen data for ${cfg.name}.</div>`;
    return;
  }

  detectScale(rows);

  const pct   = calcPct(latest) ?? 0;
  const twh   = latest.fylling_TWh;
  const cap   = latest.kapasitet_TWh;
  const delta = latest.endring_fyllingsgrad;

  // delta might also be fraction-scaled
  const deltaDisplay = (pctScale === 100 && Math.abs(delta) < 1)
    ? delta * 100
    : delta;
  const deltaSign  = deltaDisplay >= 0 ? '+' : '';
  const deltaClass = deltaDisplay >= 0 ? 'up' : 'down';

  document.getElementById('hdr-sub').textContent = `Siste: ${weekLabel(latest)}`;

  const histFrom = CURRENT_YEAR - HIST_YEARS;

  document.getElementById('main-content').innerHTML = `

    <div class="stat-card">
      <div class="gauge-wrap">
        <canvas id="donut-canvas"></canvas>
        <div class="gauge-pct">
          <span class="big">${Math.round(pct)}<span style="font-size:.7em;font-weight:600">%</span></span>
          <span class="small">fylt</span>
        </div>
      </div>
      <div class="stat-info">
        <div class="stat-region">${cfg.name}</div>
        <div class="stat-week">${weekLabel(latest)}</div>
        <div class="stat-pills">
          ${twh != null ? `<div class="pill"><div class="val">${twh.toFixed(1)} TWh</div><div class="lbl">Magasinfylling</div></div>` : ''}
          ${cap != null ? `<div class="pill"><div class="val">${cap.toFixed(1)} TWh</div><div class="lbl">Kapasitet</div></div>` : ''}
          ${deltaDisplay != null ? `<div class="pill ${deltaClass}"><div class="val">${deltaSign}${deltaDisplay.toFixed(1)} pp</div><div class="lbl">Fra forrige uke</div></div>` : ''}
        </div>
      </div>
    </div>

    <div class="chart-card">
      <div class="chart-head">
        <div class="title">Fyllingsprosent ${CURRENT_YEAR}</div>
        <div class="sub">${cfg.name}</div>
        <div class="legend">
          <span class="legend-item">
            <span class="legend-line" style="background:#004890"></span>
            ${CURRENT_YEAR}
          </span>
          <span class="legend-item">
            <span class="legend-dashed"></span>
            Normalår (median)
          </span>
          <span class="legend-item">
            <span class="legend-band"></span>
            Min/maks ${histFrom}–${CURRENT_YEAR - 1}
          </span>
        </div>
      </div>
      <div class="chart-wrap">
        <canvas id="line-canvas"></canvas>
      </div>
    </div>
  `;

  drawDonut(pct);
  drawYearChart(buildChartData(rows));
}

// ── Donut gauge ───────────────────────────────────────────────
function gaugeColor(pct) {
  if (pct >= 70) return '#004890';
  if (pct >= 40) return '#0072b0';
  if (pct >= 20) return '#f59e0b';
  return '#dc2626';
}

function drawDonut(pct) {
  const canvas = document.getElementById('donut-canvas');
  if (!canvas) return;
  if (donutChart) { donutChart.destroy(); donutChart = null; }
  donutChart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      datasets: [{
        data: [pct, 100 - pct],
        backgroundColor: [gaugeColor(pct), '#e6f0f8'],
        borderWidth: 0,
        hoverOffset: 0,
      }]
    },
    options: {
      cutout: '76%',
      plugins: { legend: { display: false }, tooltip: { enabled: false } },
      animation: { duration: 700 },
      events: [],
    }
  });
}

// ── Year chart (Jan–Des, current + normalår + min/maks) ───────
function drawYearChart({ weeks, cur, med, min, max }) {
  const canvas = document.getElementById('line-canvas');
  if (!canvas) return;
  if (lineChart) { lineChart.destroy(); lineChart = null; }

  // X labels: show month name at first week of each month, else ''
  const labels = weeks.map(w => MONTH_LABEL[w] ?? '');

  lineChart = new Chart(canvas, {
    type: 'line',
    data: {
      labels,
      datasets: [
        // ① Min — invisible baseline for fill
        {
          label: '',
          data: min,
          borderColor: 'transparent',
          backgroundColor: 'transparent',
          pointRadius: 0,
          fill: false,
          spanGaps: true,
          order: 4,
        },
        // ② Max — fills down to min dataset, creating band
        {
          label: `Min/maks (${HIST_YEARS} år)`,
          data: max,
          borderColor: 'transparent',
          backgroundColor: 'rgba(0,114,176,0.13)',
          fill: '-1',
          pointRadius: 0,
          spanGaps: true,
          order: 4,
        },
        // ③ Median / normalår
        {
          label: 'Normalår (median)',
          data: med,
          borderColor: '#9ca3af',
          borderWidth: 1.5,
          borderDash: [5, 4],
          backgroundColor: 'transparent',
          fill: false,
          pointRadius: 0,
          spanGaps: true,
          order: 2,
        },
        // ④ Current year
        {
          label: `${CURRENT_YEAR}`,
          data: cur,
          borderColor: '#004890',
          borderWidth: 2.5,
          backgroundColor: 'transparent',
          fill: false,
          pointRadius: 0,
          pointHoverRadius: 5,
          pointHoverBackgroundColor: '#004890',
          spanGaps: false,
          order: 1,
        },
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#fff',
          titleColor: '#111',
          bodyColor: '#444',
          borderColor: '#e5e7eb',
          borderWidth: 1,
          padding: 10,
          filter: item => item.dataset.label !== '',
          callbacks: {
            title: items => {
              const w = weeks[items[0].dataIndex];
              return `Uke ${w}`;
            },
            label: ctx => {
              const v = ctx.parsed.y;
              if (v == null) return null;
              return `${ctx.dataset.label}: ${v.toFixed(1)} %`;
            },
          }
        }
      },
      scales: {
        x: {
          ticks: {
            maxRotation: 0,
            autoSkip: false,
            font: { size: 10 },
            color: '#9ca3af',
          },
          grid: { display: false },
          border: { display: false },
        },
        y: {
          min: 0,
          max: 100,
          ticks: {
            callback: v => v + '%',
            font: { size: 10 },
            color: '#9ca3af',
            maxTicksLimit: 6,
          },
          grid: { color: '#f0f2f5' },
          border: { dash: [3, 3], display: false },
        }
      }
    }
  });
}

// ── Bootstrap ────────────────────────────────────────────────
async function init() {
  try {
    const res = await fetch(API);
    if (!res.ok) throw new Error(`HTTP ${res.status} – ${res.statusText}`);
    allData = await res.json();
    if (!Array.isArray(allData) || !allData.length) throw new Error('Tom respons fra API');
    renderTabs();
    renderView();
  } catch (err) {
    document.getElementById('hdr-sub').textContent = 'Feil ved lasting';
    document.getElementById('main-content').innerHTML = `
      <div class="error-box">
        <strong>Kunne ikke laste data</strong>
        ${err.message}<br><br>
        <a href="https://biapi.nve.no/magasinstatistikk/swagger/index.html"
           target="_blank" rel="noopener" style="color:#b91c1c">API-dokumentasjon →</a>
      </div>`;
  }
}

init();
</script>
</body>
</html>
